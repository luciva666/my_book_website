<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - My Stories</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="nav-brand">📖 My Stories</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li id="auth-section">
                    <a href="/auth/login.html">Login</a> | 
                    <a href="/auth/register.html">Register</a>
                </li>
                <li id="user-section">
                    <a href="/create-story.html">New Story</a> | 
                    <a href="/profile.html">Profile</a> | 
                    <a href="#" onclick="handleLogout(); return false;">Logout</a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div id="error-message" class="alert-error"></div>
        <div id="success-message" class="alert-success"></div>

        <div id="story-container">
            <div class="spinner"></div> Loading story...
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');

        if (!storyId) {
            document.getElementById('story-container').innerHTML = '<p>Story not found.</p>';
        } else {
            loadStory();
        }

        async function loadStory() {
            try {
                const data = await API.getStory(storyId);
                const story = data.story;
                const episodes = data.episodes || [];

                let html = `
                    <div class="story-header">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h1 class="story-title">${escapeHtml(story.title)}</h1>
                                <p class="story-meta">
                                    by <strong>${escapeHtml(story.author.name)}</strong> | 
                                    ${new Date(story.created_at).toLocaleDateString()}
                                </p>
                            </div>
                            ${isOwnStory(story) ? `
                                <div>
                                    <a href="/edit-story.html?id=${story.id}" class="btn btn-primary" style="margin-right: 0.5rem;">Edit</a>
                                    <button onclick="deleteStory(${story.id})" class="btn btn-danger">Delete</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;

                if (story.cover_image) {
                    html += `<img src="${story.cover_image}" alt="${story.title}" class="story-cover">`;
                }

                html += `<div class="story-body">${escapeHtml(story.body)}</div>`;

                if (episodes.length > 0) {
                    html += '<div class="episodes-section"><h2>Episodes</h2>';
                    episodes.forEach((episode, index) => {
                        html += `
                            <div class="episode-item">
                                <p class="episode-number">Episode ${index + 1}</p>
                                <div class="episode-content">${escapeHtml(episode.content)}</div>
                                <p class="story-meta">${new Date(episode.created_at).toLocaleDateString()}</p>
                                ${AuthManager.isAuthenticated() && isOwnStory(story) ? `
                                    <button onclick="editEpisode(${episode.id})" class="btn btn-secondary btn-sm" style="margin-top: 0.5rem;">Edit</button>
                                    <button onclick="deleteEpisode(${episode.id})" class="btn btn-danger btn-sm" style="margin-top: 0.5rem;">Delete</button>
                                ` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                if (AuthManager.isAuthenticated() && isOwnStory(story)) {
                    html += `
                        <div style="margin-top: 2rem;">
                            <h3>Add New Episode</h3>
                            <form id="addEpisodeForm">
                                <div class="form-group">
                                    <textarea id="episodeContent" name="content" placeholder="Write the episode content here..." required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Add Episode</button>
                            </form>
                        </div>
                    `;
                }

                document.getElementById('story-container').innerHTML = html;

                if (AuthManager.isAuthenticated() && isOwnStory(story)) {
                    document.getElementById('addEpisodeForm').addEventListener('submit', handleAddEpisode);
                }
            } catch (error) {
                showError(error.message);
                document.getElementById('story-container').innerHTML = '<p>Error loading story.</p>';
            }
        }

        function isOwnStory(story) {
            if (!AuthManager.isAuthenticated()) return false;
            return AuthManager.user && AuthManager.user.id === story.author.id;
        }

        async function handleAddEpisode(e) {
            e.preventDefault();
            const content = document.getElementById('episodeContent').value.trim();

            if (!content) {
                showError('Please enter episode content');
                return;
            }

            try {
                await API.createEpisode(storyId, content);
                showSuccess('Episode added successfully!');
                document.getElementById('episodeContent').value = '';
                loadStory();
            } catch (error) {
                showError(error.message);
            }
        }

        async function deleteStory(id) {
            if (!confirm('Are you sure you want to delete this story?')) return;

            try {
                await API.deleteStory(id);
                showSuccess('Story deleted successfully!');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showError(error.message);
            }
        }

        async function deleteEpisode(id) {
            if (!confirm('Are you sure you want to delete this episode?')) return;

            try {
                await API.deleteEpisode(id);
                showSuccess('Episode deleted successfully!');
                loadStory();
            } catch (error) {
                showError(error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function handleLogout() {
            try {
                await API.logout();
                showSuccess('Logged out successfully');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showError(error.message);
            }
        }
    </script>
</body>
</html>
