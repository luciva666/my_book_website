<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Story - My Stories</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="nav-brand">📖 My Stories</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li id="auth-section">
                    <a href="/auth/login.html">Login</a> | 
                    <a href="/auth/register.html">Register</a>
                </li>
                <li id="user-section">
                    <a href="/create-story.html">New Story</a> | 
                    <a href="/profile.html">Profile</a> | 
                    <a href="#" onclick="handleLogout(); return false;">Logout</a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="form-container">
            <div id="error-message" class="alert-error"></div>
            <div id="success-message" class="alert-success"></div>

            <h1>Edit Story</h1>

            <form id="editStoryForm">
                <div class="form-group">
                    <label for="title">Story Title</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="body">Story Description</label>
                    <textarea id="body" name="body" required></textarea>
                </div>

                <div class="form-group">
                    <label for="coverImage">Cover Image URL (optional)</label>
                    <input type="url" id="coverImage" name="coverImage">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');

        if (!AuthManager.isAuthenticated()) {
            window.location.href = '/auth/login.html';
        } else if (!storyId) {
            showError('Story not found');
            setTimeout(() => window.location.href = '/', 1000);
        } else {
            loadStory();
        }

        async function loadStory() {
            try {
                const data = await API.getStory(storyId);
                const story = data.story;

                // Check if user owns this story
                if (story.author.id !== AuthManager.user.id) {
                    showError('You can only edit your own stories');
                    setTimeout(() => window.location.href = '/', 1000);
                    return;
                }

                document.getElementById('title').value = story.title;
                document.getElementById('body').value = story.body;
                document.getElementById('coverImage').value = story.cover_image || '';
            } catch (error) {
                showError(error.message);
                setTimeout(() => window.location.href = '/', 1000);
            }
        }

        document.getElementById('editStoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const body = document.getElementById('body').value.trim();
            const coverImage = document.getElementById('coverImage').value.trim();

            if (!title || !body) {
                showError('Please fill in all required fields');
                return;
            }

            try {
                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = true;
                button.innerHTML = '<span class="spinner"></span> Saving...';

                await API.updateStory(storyId, title, body, coverImage || null);
                showSuccess('Story updated successfully! Redirecting...');

                setTimeout(() => {
                    window.location.href = `/story-view.html?id=${storyId}`;
                }, 1000);
            } catch (error) {
                showError(error.message);
                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = false;
                button.innerHTML = 'Save Changes';
            }
        });

        async function handleLogout() {
            try {
                await API.logout();
                showSuccess('Logged out successfully');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showError(error.message);
            }
        }
    </script>
</body>
</html>
