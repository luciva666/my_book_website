<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - My Stories</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="nav-brand">📖 My Stories</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li id="auth-section">
                    <a href="/auth/login.html">Login</a> | 
                    <a href="/auth/register.html">Register</a>
                </li>
                <li id="user-section">
                    <a href="/create-story.html">New Story</a> | 
                    <a href="/profile.html">Profile</a> | 
                    <a href="#" onclick="handleLogout(); return false;">Logout</a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="form-container">
            <div id="error-message" class="alert-error"></div>
            <div id="success-message" class="alert-success"></div>

            <h1>My Profile</h1>

            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">New Password (leave blank to keep current)</label>
                    <input type="password" id="password" name="password" minlength="6" placeholder="Enter to change password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/" class="btn btn-secondary">Back Home</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!AuthManager.isAuthenticated()) {
            window.location.href = '/auth/login.html';
        } else {
            loadProfile();
        }

        async function loadProfile() {
            try {
                const data = await API.getProfile();
                const user = data.user;

                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
            } catch (error) {
                showError(error.message);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email) {
                showError('Please fill in all required fields');
                return;
            }

            try {
                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = true;
                button.innerHTML = '<span class="spinner"></span> Saving...';

                const updateData = { name, email };
                if (password) {
                    updateData.password = password;
                }

                const result = await API.updateProfile(updateData);
                AuthManager.user = result.user;
                
                showSuccess('Profile updated successfully!');

                const button_elem = e.target.querySelector('button[type="submit"]');
                button_elem.disabled = false;
                button_elem.innerHTML = 'Save Changes';

                if (password) {
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                showError(error.message);
                const button = e.target.querySelector('button[type="submit"]');
                button.disabled = false;
                button.innerHTML = 'Save Changes';
            }
        });

        async function handleLogout() {
            try {
                await API.logout();
                showSuccess('Logged out successfully');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showError(error.message);
            }
        }
    </script>
</body>
</html>
